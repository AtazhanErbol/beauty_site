{% extends 'main/base.html' %}

{% block title %}Страница не найдена{% endblock %}

{% block content %}
<section class="section error-section">
    <div class="container container-narrow">
        <div class="error-card">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Страница не найдена</h2>
            <p class="error-subtitle">Похоже, такой страницы не существует или она была перемещена.</p>
            <a href="{% url 'index' %}" class="btn btn-primary btn-lg">
                <i class="fa-solid fa-house"></i> На главную
            </a>
        </div>
    </div>
</section>
{% endblock %}
